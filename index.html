<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>My Website</h1>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="container">
            <h2>Welcome to My Website</h2>
            <p>A simple static website built with HTML and CSS.</p>
            <a href="#about" class="btn">Learn More</a>
        </div>
    </section>

    <section id="about" class="about">
        <div class="container">
            <h2>About Us</h2>
            <p>
                This is a sample static website. You can customize the content,
                colors, images, and layout to fit your needs.
            </p>
        </div>
    </section>

    <footer id="contact">
        <div class="container">
            <p>&copy; 2026 My Website. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
